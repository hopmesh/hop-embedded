; Build the blink_send example against the local Hop library.
;
;   pio run                 # compile for the default board below
;   pio run -e esp32c3      # compile for a RISC-V board
;
; lib_deps points at the library root two directories up so the example builds in place. Consuming Hop
; from the PlatformIO registry instead is a one-liner:
;   lib_deps = hopmesh/Hop

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
    symlink://../../

[env:esp32dev]
board = esp32dev

[env:esp32c3]
board = esp32-c3-devkitm-1
